name: yolk
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - numpy
  - scipy
  - matplotlib
  - tifffile
  - pillow
  - pyyaml
  - pip
  - pip:
    - snakemake
    - "pulp<2.8.0"  # Pin pulp to avoid compatibility issue with snakemake
    - pyimagej  # Required for ImageJ integration in annotate_cellu_front.py
