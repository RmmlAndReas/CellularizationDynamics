# Still-image blastoderm cytoplasm pipeline (workflow/still_cytoplasm.smk)
#
# Run with conda env `yolk` (envs/analysis.yaml), e.g. conda activate yolk && snakemake ...
#
# All *.tif files under condition_dir and control_dir are processed. Set px2micron
# once at the top level; use files: only for per-sample overrides.

results_root: results/still_cytoplasm_centrifugation

condition_dir: data/Hermetia/centrifugation/stills
control_dir: data/Hermetia/wt/stills

# Moving average along x (column index) for plots; 1 = no smoothing. Even values use next odd.
# Override per file under files: if needed.
smooth_window_px: 1

# Per-cohort peak alignment for group-level plots:
# - true: shift each sample so its maximum cytoplasm height is at x=0
# - false: keep absolute x coordinates
align_condition_peak: false
align_control_peak: false

# Compare plot only: shift control curve so its finite x-span midpoint is at 0.
center_control_midpoint: false

# Defaults for every TIFF (overridden by files: below for matching filenames).
px2micron: 0.2738095

# Optional: basename -> mapping merged on top of defaults (e.g. different px2micron).
# files:
#   "special-sample.tif":
#     px2micron: 0.31

# Optional: skip these basenames when scanning folders.
# exclude_files:
#   - junk.tif
