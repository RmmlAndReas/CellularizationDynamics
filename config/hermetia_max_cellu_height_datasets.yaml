datasets:
  - name: wt
    root_folder: ../results/cellularization_dynamics/Hermetia/wt
    groups:
      - dorsal
      - ventral
      - lateral

  - name: centrifugation
    root_folder: ../results/cellularization_dynamics/Hermetia/centrifugation
    groups:
      - dorsal
      - ventral-lateral
    group_alias:
      # Optional remap for combined analyses with canonical groups.
      # Change to "lateral" instead if that better matches your curation.
      ventral-lateral: ventral

  - name: suction
    root_folder: ../results/cellularization_dynamics/Hermetia/suction
    groups:
      - dorsal

plot_max_cellu_height:
  mode: group_experiment_pairs
  groups:
    - dorsal
    - ventral
    - lateral
  experiments:
    - wt
    - centrifugation
    - suction
  show_experiment: false
  out_prefix: results/max_cellu_height_group_experiment_pairs
  layout:
    figsize: [8.4, 5.2]
    box_width: 0.58
    y_max_scale: 1.25
    x_tick_fontsize: 9